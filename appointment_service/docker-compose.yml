version: "4"
services:
  appointment-service:
    build: .
    image: appointment-service-app
    container_name: appointment-service
    ports:
      - "8087:8087"
    environment:
      AUTH_SERVICE_BASE_URL: http://auth-service:8086
      PROFILE_SERVICE_BASE_URL: http://profile-service:8083
      PAYMENT_SERVICE_BASE_URL: http://payment-service:8089
      NOTIFICATION_SERVICE_BASE_URL: http://notification-service:8082
      INTERNAL_API_KEY: profile-internal-dev-key