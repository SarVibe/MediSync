services:
  authservice-mysql:
    image: mysql:8.0
    container_name: authservice-mysql
    environment:
      MYSQL_ROOT_PASSWORD: KThanu@2002
      MYSQL_DATABASE: auth_db
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pKThanu@2002"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-network

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-network

  auth-service:
    build: .
    image: auth-service-app
    container_name: auth-service
    ports:
      - "8086:8086"
    depends_on:
      authservice-mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://authservice-mysql:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: KThanu@2002
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    networks:
      - auth-network

networks:
  auth-network:
    driver: bridge