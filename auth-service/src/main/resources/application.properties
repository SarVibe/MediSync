spring.application.name=auth-service
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=abcd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT Configuration
# Use a secure, long random string for production
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# 15 minutes (in milliseconds)
app.jwt.access-token-expiry=900000
# 7 days (in milliseconds)
app.jwt.refresh-token-expiry=604800000

# Refresh token cookie (CSRF-safe default via SameSite=Strict)
app.auth.refresh-cookie-name=refresh_token
app.auth.refresh-cookie-secure=false
app.auth.refresh-cookie-same-site=Strict
app.auth.refresh-cookie-path=/auth
app.auth.refresh-cookie-max-age-seconds=604800

# OTP Configuration
app.otp.expiry-seconds=900
app.otp.max-attempts=3
app.otp.resend-cooldown-seconds=60
app.otp.length=6

# Admin Configuration
app.admin.challenge-token-expiry-seconds=300
app.admin.seed-email=msarvi19082000@gmail.com
app.admin.seed-password=Admin@1234
app.admin.seed-phone=+94766892251

# Notification Service Configuration
app.notification-service.base-url=${NOTIFICATION_SERVICE_BASE_URL:http://localhost:8081}
app.notification-service.sms-path=/api/notifications/message
app.notification-service.email-path=/api/notifications/email

# Internal Services Configuration
app.profile-service.base-url=${PROFILE_SERVICE_BASE_URL:http://localhost:8083}
app.internal.api-key=${INTERNAL_API_KEY:profile-internal-dev-key}

# Cleanup
app.user.cleanup.unverified-hours=24

# Logging
logging.level.com.health.auth.auth_service=DEBUG

spring.redis.host=localhost
spring.redis.port=6379