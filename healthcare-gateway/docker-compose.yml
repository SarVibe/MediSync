version: "4"
services:
  gateway-service:
    build: .
    image: gateway-service-app
    container_name: healthcare-gateway
    ports:
      - "9000:9000"
    environment:
      MEDICAL_SERVICE_URL: http://medical-service:8081
      NOTIFICATION_SERVICE_URL: http://notification-service:8082
      PROFILE_SERVICE_URL: http://profile-service:8083
      AUTH_SERVICE_URL: http://auth-service:8086
      APPOINTMENT_SERVICE_URL: http://appointment-service:8087
      PAYMENT_SERVICE_URL: http://payment-service:8089
      SYMPTOM_CHECKER_SERVICE_URL: http://symptom-checker-service:8088
      TELEMEDICINE_SERVICE_URL: http://telemedicine-service:8085
      FRONTEND_URL: http://localhost:30001
    restart: unless-stopped