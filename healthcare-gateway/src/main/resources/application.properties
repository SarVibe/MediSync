spring.application.name=healthcare-gateway
server.port=9000

# Default URLs (local development)
medical.service.url=${MEDICAL_SERVICE_URL:http://localhost:8081}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8082}
profile.service.url=${PROFILE_SERVICE_URL:http://localhost:8083}
auth.service.url=${AUTH_SERVICE_URL:http://localhost:8086}
appointment.service.url=${APPOINTMENT_SERVICE_URL:http://localhost:8084}
payment.service.url=${PAYMENT_SERVICE_URL:http://localhost:8085}
telemedicine.service.url=${TELEMEDICINE_SERVICE_URL:http://localhost:8087}
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.cloud.circuitbreaker=DEBUG

# Actuator Endpoints
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Resilience 4j Circuit Breaker Properties - OPTIMIZED
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=20
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=30s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=5
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=10

# Resilience4J Timeout Properties - INCREASED TIMEOUT
resilience4j.timelimiter.configs.default.timeout-duration=60s

# Resilience4J Retry Properties - OPTIMIZED
resilience4j.retry.configs.default.max-attempts=5
resilience4j.retry.configs.default.wait-duration=1s
resilience4j.retry.configs.default.retry-exceptions[0]=java.net.ConnectException
resilience4j.retry.configs.default.retry-exceptions[1]=java.net.SocketTimeoutException
resilience4j.retry.configs.default.retry-exceptions[2]=org.springframework.web.client.ResourceAccessException
