### Notification Service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:4.1.1
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka:9093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          ports:
            - containerPort: 9092
            - containerPort: 9093
            - containerPort: 9094
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
    - name: external
      port: 9094
      targetPort: 9094
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topic-bootstrap
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: kafka-topic-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-topics
          image: apache/kafka:4.1.1
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka broker..."
              until kafka-broker-api-versions --bootstrap-server kafka:9092; do
                echo "Kafka is not ready yet, retrying in 5s..."
                sleep 5
              done

              echo "Creating required topics (idempotent)..."
              kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic email-notification-topic --partitions 1 --replication-factor 1
              kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic sms-notification-topic --partitions 1 --replication-factor 1

              echo "Verifying topics..."
              kafka-topics --list --bootstrap-server kafka:9092 | grep -E "^(email-notification-topic|sms-notification-topic)$"

              echo "Topic bootstrap complete."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-for-kafka-and-topics
          # Using Confluent Kafka image which includes all CLI tools
          image: confluentinc/cp-kafka:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka broker..."
              # Use kafka-topics to check if broker is ready (more reliable)
              while ! kafka-topics --bootstrap-server kafka:9092 --list > /dev/null 2>&1; do
                echo "Kafka is not ready yet, retrying in 5s..."
                sleep 5
              done
              
              echo "Kafka is ready! Creating topics if they don't exist..."
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic email-notification-topic --partitions 1 --replication-factor 1
              kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic sms-notification-topic --partitions 1 --replication-factor 1
              
              echo "Kafka topics are ready."
      containers:
        - name: notification-service
          image: thanu04/notification-service-app:latest
          ports:
            - containerPort: 8082
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET
              value: "earliest"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP











