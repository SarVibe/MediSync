apiVersion: apps/v1
kind: Deployment
metadata:
  name: medical-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medical-service
  template:
    metadata:
      labels:
        app: medical-service
    spec:
      containers:
        - name: medical-service
          image: thanu04/medical-service-app:latest
          ports:
            - containerPort: 8081
          env:
            - name: AUTH_SERVICE_BASE_URL
              value: http://auth-service:8086
          resources:
            requests:
              cpu: "250m"
            limits:
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: medical-service
spec:
  selector:
    app: medical-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medical-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medical-service
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50