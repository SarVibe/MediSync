spring.application.name=medical-service
spring.datasource.url=jdbc:mysql://localhost:3306/medical_records?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=abcd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
server.port=8081

spring.flyway.enabled=false

app.upload.base-dir=uploads
app.upload.prescriptions-folder=prescriptions
app.upload.medical-record-folder=medical-records
app.upload.url-prefix=/medical/uploads


# Auth service integration
app.auth-service.base-url=${AUTH_SERVICE_BASE_URL:http://localhost:8086}

# Internal service auth between auth-service and profile-service
app.internal.api-key=${INTERNAL_API_KEY:profile-internal-dev-key}


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=./medical/uploads