spring.application.name=notification-service
server.port=8082


# Actuator Endpoints
management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#Resilinece4j Properties
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=5s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5

#Resilience4J Timeout Properties
resilience4j.timelimiter.configs.default.timeout-duration=3s

#Resilience4J Retry Properties
resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=2s

# SMTP configuration (override with environment variables in higher environments)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=kamalanathanthananchayan@gmail.com
spring.mail.password=qzsxiyorepbrhbyw

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Default sender address used by EmailNotificationService
notification.email.from=${NOTIFICATION_EMAIL_FROM:kamalanathanthananchayan@gmail.com}

# notify.lk SMS configuration (override in environment for non-local use)
notification.sms.notifylk.user-id=${NOTIFYLK_USER_ID:30531}
notification.sms.notifylk.api-key=${NOTIFYLK_API_KEY:uHsd8FDvDYg4sonpJHxv}
notification.sms.notifylk.sender-id=${NOTIFYLK_SENDER_ID:NotifyDEMO}
notification.sms.notifylk.base-url=${NOTIFYLK_BASE_URL:https://app.notify.lk/api/v1/send}

# Kafka configuration for async SMS queue processing
# Use localhost:9094 when running Spring Boot on the host machine.
# In docker-compose, notification-service overrides this via KAFKA_BOOTSTRAP_SERVERS=kafka:9092.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.max.block.ms=10000
spring.kafka.producer.properties.request.timeout.ms=10000
spring.kafka.producer.properties.delivery.timeout.ms=20000
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.healthcare.notification.notification_service.dto
spring.kafka.consumer.properties.spring.json.value.default.type=com.healthcare.notification.notification_service.dto.SmsNotificationEvent
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.admin.auto-create=true

# SMS Kafka Topic Configuration
notification.sms.kafka.topic=${NOTIFICATION_SMS_KAFKA_TOPIC:sms-notification-topic}
notification.sms.kafka.group-id=${NOTIFICATION_SMS_KAFKA_GROUP_ID:sms-notification-consumer-group}
notification.sms.kafka.partitions=${NOTIFICATION_SMS_KAFKA_PARTITIONS:1}
notification.sms.kafka.replicas=${NOTIFICATION_SMS_KAFKA_REPLICAS:1}
notification.sms.kafka.publish-timeout-seconds=${NOTIFICATION_SMS_KAFKA_PUBLISH_TIMEOUT_SECONDS:10}

# Email Kafka Topic Configuration
notification.email.kafka.topic=${NOTIFICATION_EMAIL_KAFKA_TOPIC:email-notification-topic}
notification.email.kafka.group-id=${NOTIFICATION_EMAIL_KAFKA_GROUP_ID:email-notification-consumer-group}
notification.email.kafka.partitions=${NOTIFICATION_EMAIL_KAFKA_PARTITIONS:1}
notification.email.kafka.replicas=${NOTIFICATION_EMAIL_KAFKA_REPLICAS:1}
notification.email.kafka.publish-timeout-seconds=${NOTIFICATION_EMAIL_KAFKA_PUBLISH_TIMEOUT_SECONDS:10}
