apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: thanu04/payment-service-app:latest
          ports:
            - containerPort: 8089        
          env:
            - name: AUTH_SERVICE_BASE_URL
              value: "http://auth-service:8086"
            - name: APPOINTMENT_SERVICE_BASE_URL
              value: "http://appointment-service:8087"
            - name: NOTIFICATION_SERVICE_BASE_URL
              value: "http://notification-service:8082"
          resources:
            requests:
              cpu: "250m"
            limits:
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  selector:
    app: payment-service
  ports:
    - port: 8089
      targetPort: 8089
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50