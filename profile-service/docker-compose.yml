services:
  profileservice-mysql:
    image: mysql:8.0
    container_name: profileservice-mysql
    environment:
      MYSQL_ROOT_PASSWORD: KThanu@2002
      MYSQL_DATABASE: profile_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pKThanu@2002"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profile-network

  profile-service:
    build: .
    image: profile-service-app
    container_name: profile-service
    ports:
      - "8083:8083"
    depends_on:
      profileservice-mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://profileservice-mysql:3306/profile_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: KThanu@2002
      AUTH_SERVICE_BASE_URL: http://auth-service:8086
    networks:
      - profile-network

networks:
  profile-network:
    driver: bridge