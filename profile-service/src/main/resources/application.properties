spring.application.name=profile-service
server.port=8083

# Database Configuration - Use placeholders
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/profile_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:KThanu@2002}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Auth service integration
app.auth-service.base-url=${AUTH_SERVICE_BASE_URL:http://localhost:8086}

# Internal service auth between auth-service and profile-service
app.internal.api-key=${INTERNAL_API_KEY:profile-internal-dev-key}

# Local profile image uploads
app.upload.dir=${UPLOAD_DIR:${user.dir}/uploads}
app.upload.public-base-url=${UPLOAD_PUBLIC_BASE_URL:http://localhost:8083}
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

logging.level.com.health.profile.profile_service=DEBUG