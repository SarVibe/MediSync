apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telemedicine-service
  template:
    metadata:
      labels:
        app: telemedicine-service
    spec:
      containers:
        - name: telemedicine-service
          image: thanu04/telemedicine-service-app:latest
          ports:
            - containerPort: 8085
          env:
            - name: AUTH_SERVICE_BASE_URL
              value: "http://auth-service:8086"
            - name: APPOINTMENT_SERVICE_BASE_URL
              value: "http://appointment-service:8087"
            - name: NOTIFICATION_SERVICE_BASE_URL
              value: "http://notification-service:8082"
            - name: PROFILE_SERVICE_BASE_URL
              value: "http://profile-service:8083"
          resources:
            requests:
              cpu: "250m"
            limits:
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine-service
spec:
  selector:
    app: telemedicine-service
  ports:
    - port: 8085
      targetPort: 8085
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: telemedicine-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: telemedicine-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50